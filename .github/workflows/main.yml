name: Motor Diario de Rastreo de Precios

on:
  schedule:
    # Se ejecuta todos los días a las 8:00 AM UTC (3:00 AM hora de Lima/Bogotá)
    - cron: '0 8 * * *' 
  workflow_dispatch: # Este comando te pondrá un botón en GitHub para ejecutarlo manualmente cuando quieras probarlo.

jobs:
  ejecutar-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v3

      - name: Preparar el entorno Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: pip install -r requirements.txt

      - name: Ejecutar el rastreador
        env:
          # Aquí inyectaremos las credenciales de Google de forma segura más adelante
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }} 
        run: python scraper.py
